<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>防風噴射打火機</title>
    <style>
        :root {
            --bg-color: #0d0d0d; 
            --lighter-width: 160px; 
            --lighter-height: 400px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }

        .lighters-container {
            position: relative;
            cursor: pointer;
            width: var(--lighter-width);
            height: var(--lighter-height);
        }

        .lighter-image {
            width: 100%;
            height: 100%;
            background-image: url('lighter.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            z-index: 10;
        }

        /* 防風噴射火焰效果 */
        .flame-container {
            position: absolute;
            top: 15px; /* 根據噴嘴位置微調 */
            left: 70%; /* 根據噴嘴位置微調 */
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 外層淡藍色火燄 */
        .flame-outer {
            width: 12px;
            height: 90px;
            background: linear-gradient(to top, rgba(0, 150, 255, 0.8), rgba(0, 80, 255, 0.1));
            border-radius: 50% 50% 20% 20%;
            filter: blur(2px);
            position: relative;
        }

        /* 內層深藍/白核心噴頭 */
        .flame-inner {
            width: 6px;
            height: 50px;
            background: linear-gradient(to top, #fff, #00d4ff);
            border-radius: 50% 50% 10% 10%;
            position: absolute;
            bottom: 0;
            filter: blur(1px);
            box-shadow: 0 0 15px #00d4ff;
        }

        /* 噴射震動動畫 */
        @keyframes jet-flicker {
            0% { transform: translateX(-50%) scaleY(1) rotate(-0.5deg); opacity: 0.9; }
            50% { transform: translateX(-50%) scaleY(1.05) rotate(0.5deg); opacity: 1; }
            100% { transform: translateX(-50%) scaleY(1) rotate(-0.5deg); opacity: 0.9; }
        }

        .active .flame-container {
            transform: translateX(-50%) scale(1);
            animation: jet-flicker 0.05s infinite;
        }

        .hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            color: #444;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="lighters-container" id="lighter">
        <div class="flame-container">
            <div class="flame-outer"></div>
            <div class="flame-inner"></div>
        </div>
        <div class="lighter-image"></div>
        <div class="hint">CLICK TO IGNITE</div>
    </div>

    <script>
        const lighter = document.getElementById('lighter');
        let isOn = false;

        // 使用 Web Audio API 合成更清脆的「咖」聲，解決外部檔案載入失敗的問題
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playClickSound() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // 模擬金屬撞擊聲 (High-pass style)
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        lighter.addEventListener('click', () => {
            isOn = !isOn;
            if (isOn) {
                lighter.classList.add('active');
                document.body.style.backgroundColor = "#050a10"; // 暗藍色光暈
                playClickSound();
            } else {
                lighter.classList.remove('active');
                document.body.style.backgroundColor = "#0d0d0d";
            }
        });
    </script>
</body>
</html>
