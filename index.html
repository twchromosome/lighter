<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虛擬噴射打火機</title>
    <style>
        /* 基礎設定 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505; /* 預設極暗環境 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 禁用選取與預設點擊高光，提升 App 原生感 */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            transition: background-color 0.3s ease;
        }

        /* 點火時的整體環境光暈 */
        body.lit {
            background-color: #2a1505;
        }

        /* 點火時背景擴散的環境光暈 (Radial Gradient) */
        #glow-background {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vw;
            background: radial-gradient(circle, rgba(255, 100, 0, 0.15) 0%, rgba(0, 0, 0, 0) 60%);
            opacity: 0;
            transition: opacity 0.1s ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        body.lit #glow-background {
            opacity: 1;
        }

        /* 打火機容器 */
        #lighter-container {
            position: relative;
            width: 65vw; /* 適配手機寬度 */
            max-width: 300px;
            cursor: pointer;
            z-index: 10;
        }

        /* 打火機圖片 */
        #lighter-img {
            width: 100%;
            display: block;
            /* 加入一點細微陰影讓機身立體 */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* 防風噴射火焰 (Jet Flame) */
        #flame {
            position: absolute;
            /* 定位到右上方的銀色圓盤噴嘴 */
            /* 您可微調 top 與 right 的 % 數來達到完美對齊 */
            top: -2%; 
            right: 18%; 
            
            width: 14px;
            height: 80px;
            
            /* 噴射火焰核心：底層白藍色 */
            background: linear-gradient(to top, #ffffff 0%, #00ffff 20%, #ff5500 80%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            
            /* 外焰光暈：藍橘交織 */
            box-shadow: 
                0 0 10px #00bfff,      /* 底部藍光 */
                0 -10px 25px #ff4500,  /* 頂部橘紅光 */
                0 0 40px #ff8c00;      /* 整體外圍橘光 */
            
            transform-origin: bottom center;
            opacity: 0;
            pointer-events: none; /* 確保不會阻擋點擊事件 */
            mix-blend-mode: screen; /* 讓火焰與背景有真實的光線疊加效果 */
        }

        /* 點火時的火焰動畫狀態 */
        #flame.active {
            opacity: 1;
            /* 極高頻微小脈動/震動 */
            animation: jet-vibrate 0.04s infinite alternate;
        }

        /* 噴射火焰特有的高頻震動關鍵影格 */
        @keyframes jet-vibrate {
            0% { transform: translateY(0) scaleX(1) scaleY(1); }
            100% { transform: translateY(-3px) scaleX(1.05) scaleY(1.02); }
        }

    </style>
</head>
<body>

    <div id="glow-background"></div>

    <div id="lighter-container">
        <img id="lighter-img" src="lighter off.png" alt="Lighter" draggable="false">
        <div id="flame"></div>
    </div>

    <audio id="lighter-audio" src="lighter-sound-effect-feuerzeug-sound_PWeyCCjp.mp3" preload="auto"></audio>

    <script>
        const container = document.getElementById('lighter-container');
        const img = document.getElementById('lighter-img');
        const flame = document.getElementById('flame');
        const audio = document.getElementById('lighter-audio');
        const body = document.body;

        let isLit = false;

        // 切換打火機狀態的函數
        function toggleLighter(e) {
            // 防止手機端雙擊縮放或其他預設行為
            e.preventDefault(); 
            
            isLit = !isLit;

            if (isLit) {
                // 點火狀態
                img.src = 'lighter on.png';
                flame.classList.add('active');
                body.classList.add('lit');
                
                // 音效處理：每次點火都從頭播放
                audio.currentTime = 0; 
                audio.play().catch(error => {
                    console.log("瀏覽器自動播放限制，請確保由使用者手動點擊觸發", error);
                });
            } else {
                // 熄火狀態
                img.src = 'lighter off.png';
                flame.classList.remove('active');
                body.classList.remove('lit');
                
                // 停止音效
                audio.pause();
            }
        }

        // 使用 pointerdown 事件可同時完美兼容滑鼠點擊與手機觸控，且反應最即時
        container.addEventListener('pointerdown', toggleLighter);
    </script>

</body>
</html>
