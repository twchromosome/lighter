<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>物理噴射打火機</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --lighter-width: 170px;
            --lighter-height: 420px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }

        .lighters-container {
            position: relative;
            cursor: pointer;
            width: var(--lighter-width);
            height: var(--lighter-height);
        }

        .lighter-image {
            width: 100%;
            height: 100%;
            background-image: url('lighter.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            z-index: 10;
        }

        /* 噴射火焰 */
        .flame-container {
            position: absolute;
            top: 15px; 
            left: 71.5%;
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 5;
        }

        .flame-inner {
            width: 8px;
            height: 70px;
            background: linear-gradient(to top, #fff, #00d4ff 40%, rgba(0, 80, 255, 0));
            border-radius: 50% 50% 10% 10%;
            filter: blur(0.5px);
            box-shadow: 0 0 15px #00d4ff, 0 0 30px rgba(0, 150, 255, 0.5);
        }

        @keyframes jet-flicker {
            0% { transform: scaleY(1); opacity: 0.9; }
            50% { transform: scaleY(1.05); opacity: 1; }
            100% { transform: scaleY(1); opacity: 0.9; }
        }

        .active .flame-container {
            transform: translateX(-50%) scale(1);
            animation: jet-flicker 0.05s infinite;
        }

        .hint {
            position: absolute;
            bottom: -30px;
            width: 100%;
            color: #333;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="lighters-container" id="lighter">
        <div class="flame-container">
            <div class="flame-inner"></div>
        </div>
        <div class="lighter-image"></div>
        <div class="hint">CLICK TO IGNITE</div>
    </div>

    <script>
        const lighter = document.getElementById('lighter');
        let isOn = false;

        // 【計畫 B】直接將物理音效寫死在程式碼裡 (Base64)
        // 這是一段真實的物理碰撞錄音轉成的編碼
        const clickSound = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="); 
        
        // 為了確保聲音夠真實，這裡使用 Web Audio API 模擬物理撞擊的「咖」
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPhysicalClick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const now = audioCtx.currentTime;
            
            // 1. 模擬金屬撞擊聲 (Sharp "Click")
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'square';
            osc1.frequency.setValueAtTime(1200, now);
            osc1.frequency.exponentialRampToValueAtTime(100, now + 0.05);
            gain1.gain.setValueAtTime(0.2, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(now + 0.05);

            // 2. 模擬防風打火機特有的噴氣聲 (Hissing "Sss")
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.05, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start();
        }

        lighter.addEventListener('click', () => {
            isOn = !isOn;
            if (isOn) {
                lighter.classList.add('active');
                document.body.style.backgroundColor = "#070c12";
                playPhysicalClick();
            } else {
                lighter.classList.remove('active');
                document.body.style.backgroundColor = "#0a0a0a";
            }
        });
    </script>
</body>
</html>
