<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>真實物理防風打火機 (狠狠加粗版)</title>
    <style>
        :root {
            /* 預設暗灰色背景 */
            --bg-color: #1a1c1e; 
            /* 點火時環境色：變暖、變亮 */
            --bg-active: #2c241e; 
            --lighter-width: 180px;
            --lighter-height: 440px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease;
        }

        .lighters-container {
            position: relative;
            cursor: pointer;
            width: var(--lighter-width);
            height: var(--lighter-height);
            display: flex;
            justify-content: center;
        }

        /* 打火機圖片 */
        .lighter-image {
            width: 100%;
            height: 100%;
            background-image: url('lighter.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            position: absolute;
            bottom: 0;
            z-index: 5;
            transition: filter 0.3s ease;
        }

        /* 火焰容器：鎖定在噴嘴位置 */
        .flame-container {
            position: absolute;
            bottom: 84.5%; /* 鎖定在噴嘴高度 */
            left: 71.5%;  /* 鎖定在噴嘴水平位置 */
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            pointer-events: none;
        }

        /* 【重要】真實噴射火焰：下藍核心 (狠狠加粗) */
        .flame-inner-core {
            width: 20px; /* 大幅加粗 */
            height: 160px; /* 增加高度 */
            background: linear-gradient(to top, #fff 0%, #00d4ff 40%, rgba(0, 80, 255, 0) 100%);
            border-radius: 50% 50% 10% 10%;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 30px #00d4ff;
        }

        /* 【重要】真實噴射火焰：上橘外焰 (融合並狠狠加粗) */
        .flame-outer-glow {
            width: 40px; /* 大幅加粗 */
            height: 180px; /* 稍微高於藍核心 */
            background: linear-gradient(to top, rgba(255, 120, 0, 0.8) 0%, rgba(255, 60, 0, 0) 100%);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(2.5px);
            box-shadow: 0 0 50px #ff6a00, 0 0 100px rgba(255, 0, 0, 0.6);
        }

        /* 強勁噴射震動動畫 */
        @keyframes jet-pulse {
            0% { transform: translateX(-50%) scale(1); opacity: 0.95; }
            50% { transform: translateX(-50%) scale(1.03) scaleY(1.08); opacity: 1; }
            100% { transform: translateX(-50%) scale(1); opacity: 0.95; }
        }

        /* 點火後的環境火光感同步強化 */
        .active .lighter-image {
            filter: drop-shadow(0 0 60px rgba(255, 150, 0, 0.8)) brightness(1.2); /* 環境光暈更寬廣 */
        }

        .active .flame-container {
            transform: translateX(-50%) scale(1);
            animation: jet-pulse 0.04s infinite; /* 加快動畫速度模擬高壓噴射 */
        }

        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            color: #555;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="lighters-container" id="lighter">
        <div class="flame-container">
            <div class="flame-outer-glow"></div>
            <div class="flame-inner-core"></div>
        </div>
        <div class="lighter-image"></div>
        <p class="hint">CLICK TO IGNITE</p>
    </div>

    <script>
        const lighter = document.getElementById('lighter');
        let isOn = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPhysicalClick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            // 咖聲 (物理撞擊)
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(1300, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.04);
            g.gain.setValueAtTime(0.25, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.04);

            // 噴氣聲 (嘶嘶聲)
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.12, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const ng = audioCtx.createGain();
            ng.gain.setValueAtTime(0.06, now);
            ng.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
            noise.connect(ng); ng.connect(audioCtx.destination);
            noise.start();
        }

        lighter.addEventListener('click', () => {
            isOn = !isOn;
            if (isOn) {
                lighter.classList.add('active');
                // 點火時背景變暖、變亮，呈現火光感
                document.body.style.backgroundColor = "var(--bg-active)";
                playPhysicalClick();
            } else {
                lighter.classList.remove('active');
                // 熄火還原背景色
                document.body.style.backgroundColor = "var(--bg-color)";
            }
        });
    </script>
</body>
</html>
