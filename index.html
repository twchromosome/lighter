<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>防風噴射打火機 - 最終優化版</title>
    <style>
        :root {
            /* 調亮背景，確保看得到黑色機身 */
            --bg-color: #1a1c1e; 
            --bg-active: #2c241e; 
            --lighter-width: 180px;
            --lighter-height: 440px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease;
        }

        .lighters-container {
            position: relative;
            cursor: pointer;
            width: var(--lighter-width);
            height: var(--lighter-height);
            display: flex;
            justify-content: center;
        }

        /* 打火機圖片 */
        .lighter-image {
            width: 100%;
            height: 100%;
            background-image: url('lighter.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom; /* 鎖定底部對齊 */
            position: absolute;
            bottom: 0;
            z-index: 5;
            transition: filter 0.3s ease;
        }

        /* 火焰容器：使用百分比定位，鎖定在圖片的噴嘴處 */
        .flame-container {
            position: absolute;
            bottom: 84.5%; /* 鎖定在噴嘴高度 */
            left: 71.5%;  /* 鎖定在噴嘴水平位置 */
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; /* 確保在最前面 */
            pointer-events: none;
        }

        /* 噴射火焰：下藍核心 (加粗) */
        .flame-inner-core {
            width: 12px; /* 加粗 */
            height: 150px;
            background: linear-gradient(to top, #fff 0%, #00d4ff 35%, rgba(0, 80, 255, 0) 100%);
            border-radius: 50% 50% 10% 10%;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 25px #00d4ff;
        }

        /* 噴射火焰：上橘外焰 (加粗) */
        .flame-outer-glow {
            width: 26px; /* 加粗 */
            height: 170px;
            background: linear-gradient(to top, rgba(255, 110, 0, 0.8) 0%, rgba(255, 50, 0, 0) 100%);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(2.5px);
            box-shadow: 0 0 45px #ff6a00, 0 0 90px rgba(255, 0, 0, 0.5);
        }

        @keyframes jet-shake {
            0% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(1.06) scaleX(1.03); }
            100% { transform: translateX(-50%) scaleY(1); }
        }

        /* 點火後的視覺效果 */
        .active .lighter-image {
            filter: drop-shadow(0 0 40px rgba(255, 130, 0, 0.5)) brightness(1.1);
        }

        .active .flame-container {
            transform: translateX(-50%) scale(1);
            animation: jet-shake 0.05s infinite;
        }

        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            color: #555;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="lighters-container" id="lighter">
        <div class="flame-container">
            <div class="flame-outer-glow"></div>
            <div class="flame-inner-core"></div>
        </div>
        <div class="lighter-image"></div>
        <p class="hint">CLICK TO IGNITE</p>
    </div>

    <script>
        const lighter = document.getElementById('lighter');
        let isOn = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPhysicalClick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            // 咖聲 (物理撞擊)
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(1300, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.04);
            g.gain.setValueAtTime(0.25, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.04);

            // 噴氣聲 (嘶嘶聲)
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.12, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const ng = audioCtx.createGain();
            ng.gain.setValueAtTime(0.06, now);
            ng.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
            noise.connect(ng); ng.connect(audioCtx.destination);
            noise.start();
        }

        lighter.addEventListener('click', () => {
            isOn = !isOn;
            if (isOn) {
                lighter.classList.add('active');
                document.body.style.backgroundColor = "var(--bg-active)";
                playPhysicalClick();
            } else {
                lighter.classList.remove('active');
                document.body.style.backgroundColor = "var(--bg-color)";
            }
        });
    </script>
</body>
</html>
