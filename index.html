<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虛擬打火機</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    touch-action: none;
  }

  .lighter {
    position: relative;
    width: 200px;
    height: 400px;
    background-image: url("./assets/lighter.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }

  /* 火焰容器 */
  .flame {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 120px;
    opacity: 0;
    pointer-events: none;
  }

  /* 火焰主體：下藍上橘 */
  .flame-core {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 80%, #4acbff 0%, #007bff 40%, transparent 70%);
    filter: blur(6px);
    animation: coreFlicker 0.08s infinite alternate;
  }

  .flame-outer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 20%, #ffe0a0 0%, #ff9a3c 40%, #ff5e00 70%, transparent 100%);
    filter: blur(8px);
    animation: outerFlicker 0.12s infinite alternate;
  }

  @keyframes coreFlicker {
    from { transform: scaleY(1); opacity: 0.9; }
    to   { transform: scaleY(0.9); opacity: 0.7; }
  }

  @keyframes outerFlicker {
    from { transform: scaleY(1.05) translateX(0); }
    to   { transform: scaleY(0.95) translateX(3px); }
  }

  .flame.on {
    opacity: 1;
    transition: opacity 0.15s ease-out;
  }

  .flame.off {
    opacity: 0;
    transition: opacity 0.15s ease-in;
  }

  .hint {
    position: absolute;
    bottom: 20px;
    color: #fff;
    font-size: 14px;
    opacity: 0.7;
    text-align: center;
    width: 100%;
  }
</style>
</head>

<body>

<div class="lighter" id="lighter">
  <div class="flame" id="flame">
    <div class="flame-core"></div>
    <div class="flame-outer"></div>
  </div>
</div>

<div class="hint">長按點火，放開熄滅</div>

<audio id="clickSound" src="./assets/click.mp3"></audio>

<script>
  const lighter = document.getElementById("lighter");
  const flame = document.getElementById("flame");
  const clickSound = document.getElementById("clickSound");

  function ignite() {
    flame.classList.remove("off");
    flame.classList.add("on");
    clickSound.currentTime = 0;
    clickSound.play();
  }

  function extinguish() {
    flame.classList.remove("on");
    flame.classList.add("off");
  }

  // 手機
  lighter.addEventListener("touchstart", e => {
    e.preventDefault();
    ignite();
  });

  lighter.addEventListener("touchend", e => {
    e.preventDefault();
    extinguish();
  });

  // 電腦測試
  lighter.addEventListener("mousedown", ignite);
  window.addEventListener("mouseup", extinguish);
</script>

</body>
</html>
