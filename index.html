<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>我的自訂打火機</title>
    <style>
        :root {
            --bg-color: #1a1a1a; 
            --lighter-width: 160px; 
            --lighter-height: 400px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }

        .lighters-container {
            position: relative;
            cursor: pointer;
            width: var(--lighter-width);
            height: var(--lighter-height);
        }

        /* 這裡路徑必須與 GitHub 上的圖片名稱完全一致 */
        .lighter-image {
            width: 100%;
            height: 100%;
            background-image: url('lighter.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            z-index: 10;
        }

        /* 火燄樣式 - 對齊你畫的圓盤噴嘴 */
        .flame {
            width: 35px;
            height: 70px;
            background: linear-gradient(to bottom, #fff, #ffeb3b, #ff9800, #f44336);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: 25px; /* 調整火燄高低，使其剛好在噴嘴上方 */
            left: 70%; /* 調整火燄左右位置，使其對齊噴嘴 */
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            filter: blur(1px);
            box-shadow: 0 0 20px #ff9800, 0 0 40px #f44336;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
            50% { transform: translateX(-50%) scale(1.05) rotate(1deg); }
            100% { transform: translateX(-50%) scale(1) rotate(-1deg); }
        }

        .active .flame {
            transform: translateX(-50%) scale(1.2);
            animation: flicker 0.1s infinite;
        }

        .hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            color: #555;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="lighters-container" id="lighter">
        <div class="flame"></div>
        <div class="lighter-image"></div>
        <div class="hint">點擊打火機開關</div>
    </div>

    <audio id="click-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2560/2560-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const lighter = document.getElementById('lighter');
        const sound = document.getElementById('click-sound');
        let isOn = false;

        lighter.addEventListener('click', () => {
            isOn = !isOn;
            if (isOn) {
                lighter.classList.add('active');
                document.body.style.backgroundColor = "#3d2b1f";
                sound.currentTime = 0;
                sound.play().catch(e => console.log("等待使用者互動後播放"));
            } else {
                lighter.classList.remove('active');
                document.body.style.backgroundColor = "#1a1a1a";
            }
        });
    </script>
</body>
</html>
