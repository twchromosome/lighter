<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jet Lighter Experience</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --ignited-bg: #1a1815;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            transition: background-color 0.15s ease-out;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* 點火時背景調亮並產生暖色調 */
        body.is-active {
            background-color: var(--ignited-bg);
        }

        /* 打火機容器 - 決定整體大小與縮放 */
        .lighter-wrapper {
            position: relative;
            width: 85vw;
            max-width: 320px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s active;
        }

        .lighter-wrapper:active {
            transform: scale(0.98);
        }

        /* 機身圖片 */
        .lighter-body {
            width: 100%;
            height: auto;
            display: block;
            z-index: 10;
            position: relative;
        }

        /* 火焰容器 - 絕對百分比定位鎖定噴嘴 */
        .jet-flame-container {
            position: absolute;
            top: 3.5%;    /* 根據 lighter on.png 噴嘴位置精確定位 */
            right: 17%;   /* 根據 lighter on.png 噴嘴位置精確定位 */
            width: 40px;
            height: 150px;
            display: none;
            transform-origin: bottom center;
            z-index: 5;
            pointer-events: none;
        }

        .is-active .jet-flame-container {
            display: block;
            /* 高頻震動模擬高壓噴射 */
            animation: flame-vibrate 0.04s infinite alternate;
        }

        /* 火焰構造：外焰 */
        .flame-outer {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #ff4d00 10%, #ff8800 50%, transparent 100%);
            filter: blur(5px);
            border-radius: 50% 50% 20% 20%;
            opacity: 0.8;
        }

        /* 火焰構造：白色/藍色核心 */
        .flame-core {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 35%;
            height: 60%;
            background: linear-gradient(to top, #ffffff 0%, #00d4ff 40%, transparent 100%);
            filter: blur(1px);
            border-radius: 50% 50% 10% 10%;
            z-index: 6;
            box-shadow: 0 0 15px #00d4ff;
        }

        /* 環境火光光暈 */
        .ambient-glow {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255, 100, 0, 0.3) 0%, transparent 70%);
            z-index: 1;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        .is-active .ambient-glow {
            opacity: 1;
        }

        /* 動畫：極高頻脈動 */
        @keyframes flame-vibrate {
            0% { transform: scaleY(1) translateX(-50%) rotate(-0.5deg); }
            100% { transform: scaleY(1.08) translateX(-50%) rotate(0.5deg); }
        }

        /* 提示字 */
        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 14px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="lighter-wrapper" id="lighter">
        <img src="lighter off.png" id="lighter-img" class="lighter-body" alt="Lighter">
        
        <div class="jet-flame-container">
            <div class="flame-outer"></div>
            <div class="flame-core"></div>
            <div class="ambient-glow"></div>
        </div>

        <div class="hint">TAP TO IGNITE</div>
    </div>

    <audio id="ignite-audio" src="feuerzeug-sound.mp3" preload="auto"></audio>

    <script>
        const lighter = document.getElementById('lighter');
        const lighterImg = document.getElementById('lighter-img');
        const audio = document.getElementById('ignite-audio');
        const body = document.body;

        let ignited = false;

        // 預載圖片防止切換閃爍
        const imgOn = new Image();
        imgOn.src = "lighter on.png";
        const imgOff = new Image();
        imgOff.src = "lighter off.png";

        function handleToggle(e) {
            e.preventDefault(); // 防止移動端縮放或長按菜單
            
            ignited = !ignited;

            if (ignited) {
                // 開火
                body.classList.add('is-active');
                lighterImg.src = "lighter on.png";
                
                // 音效對接：按下即播放
                audio.currentTime = 0;
                audio.play();
            } else {
                // 關火
                body.classList.remove('is-active');
                lighterImg.src = "lighter off.png";
                
                // 模擬物理手感，停止音效或讓它播完
                // 若要立即切斷：audio.pause(); audio.currentTime = 0;
            }
        }

        // 同時支援點擊與觸控，解決手機延遲與防誤觸
        lighter.addEventListener('touchstart', handleToggle, { passive: false });
        lighter.addEventListener('mousedown', (e) => {
            if ('ontouchstart' in window) return; // 如果是觸控設備，忽略 mousedown
            handleToggle(e);
        });

        // 解決音效受限：首次互動後解鎖音頻
        document.body.addEventListener('click', () => {
            if (audio.paused && !ignited) {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(()=>{});
            }
        }, { once: true });
    </script>
</body>
</html>
