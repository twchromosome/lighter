<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>防風打火機 2.0</title>
    <style>
        /* 1. 核心參數設定：你可以在這裡快速微調 */
        :root {
            --bg-dark: #121212;        /* 熄火時背景色 (看得見機身) */
            --bg-ignited: #251d16;     /* 點火時環境暖光 */
            --flame-width: 50px;       /* 核心火燄寬度 (狠狠加粗) */
            --flame-height: 180px;     /* 火燄噴射長度 */
            --nozzle-x: 71.5%;         /* 噴嘴水平位置 (百分比) */
            --nozzle-y: 15.5%;         /* 噴嘴垂直位置 (從頂部算) */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-dark);
            font-family: sans-serif;
            transition: background-color 0.3s ease;
        }

        /* 2. 容器架構：確保圖片與火燄永遠對齊 */
        .lighter-stage {
            position: relative;
            width: 80vw;
            max-width: 300px;
            aspect-ratio: 1 / 2.5; /* 根據你的圖片比例調整 */
            cursor: pointer;
        }

        /* 打火機本體圖 */
        .lighter-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 10;
            transition: filter 0.2s;
        }

        /* 3. 火燄組件：下藍上橘結構 */
        .jet-flame {
            position: absolute;
            left: var(--nozzle-x);
            top: var(--nozzle-y);
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            z-index: 20; /* 置頂，不被圖片遮擋 */
            pointer-events: none;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        /* 橘色外燄 (寬廣光暈) */
        .flame-glow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: calc(var(--flame-width) * 2.2);
            height: calc(var(--flame-height) * 1.1);
            background: linear-gradient(to top, 
                rgba(255, 80, 0, 0.9) 0%, 
                rgba(255, 120, 0, 0.4) 40%, 
                transparent 100%);
            filter: blur(8px);
            border-radius: 50% 50% 20% 20%;
        }

        /* 藍白核心 (強勁噴射) */
        .flame-core {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: var(--flame-width);
            height: var(--flame-height);
            background: linear-gradient(to top, 
                #ffffff 0%, 
                #00d4ff 25%, 
                rgba(0, 80, 255, 0.7) 60%, 
                transparent 100%);
            border-radius: 50% 50% 10% 10%;
            box-shadow: 0 0 20px #00d4ff;
        }

        /* 4. 動畫效果 */
        @keyframes rumble {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.03) scaleY(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* 5. 狀態切換 (點火時) */
        .is-on {
            background-color: var(--bg-ignited);
        }

        .is-on .jet-flame {
            transform: translateX(-50%) scale(1);
            animation: rumble 0.04s infinite;
        }

        .is-on .lighter-img {
            filter: drop-shadow(0 0 30px rgba(255, 100, 0, 0.6)) brightness(1.1);
        }

        .hint {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: #555;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body id="mainBody">

    <div class="lighter-stage" id="lighter">
        <div class="jet-flame">
            <div class="flame-glow"></div>
            <div class="flame-core"></div>
        </div>

        <img src="lighter.png" class="lighter-img" alt="Lighter">

        <div class="hint">CLICK TO IGNITE</div>
    </div>

    <script>
        const lighter = document.getElementById('lighter');
        const body = document.getElementById('mainBody');
        let active = false;

        // 使用 Web Audio API 生成物理撞擊 + 噴氣聲
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            // 「咖」：金屬敲擊聲
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(1400, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.04);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.04);

            // 「嘶」：高壓噴氣聲
            const bufSize = audioCtx.sampleRate * 0.15;
            const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for(let i=0; i<bufSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const nGain = audioCtx.createGain();
            nGain.gain.setValueAtTime(0.07, now);
            nGain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            noise.connect(nGain); nGain.connect(audioCtx.destination);
            noise.start();
        }

        lighter.addEventListener('click', (e) => {
            active = !active;
            if (active) {
                body.classList.add('is-on');
                lighter.classList.add('is-on');
                playSound();
            } else {
                body.classList.remove('is-on');
                lighter.classList.remove('is-on');
            }
        });
    </script>
</body>
</html>
