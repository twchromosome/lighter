<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虛擬噴射打火機</title>
    <style>
        /* 基礎設定 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            transition: background-color 0.3s ease;
        }

        /* 點火時的整體環境光暈 */
        body.lit {
            background-color: #2a1505;
        }

        /* 點火時背景擴散的環境光暈 */
        #glow-background {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vw;
            background: radial-gradient(circle, rgba(255, 100, 0, 0.15) 0%, rgba(0, 0, 0, 0) 60%);
            opacity: 0;
            transition: opacity 0.1s ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        body.lit #glow-background {
            opacity: 1;
        }

        /* 打火機容器 */
        #lighter-container {
            position: relative;
            width: 65vw;
            max-width: 300px;
            cursor: pointer;
            z-index: 10;
        }

        /* 打火機圖片 */
        #lighter-img {
            width: 100%;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* ==========================================
           🔥 防風噴射火焰 (可手動調整參數區)
           ========================================== */
        #flame {
            position: absolute;
            
            /* 【對齊參數】 
               如果火焰沒有對準銀色噴嘴，請微調這裡的 % 數：
               top: 數字越小(或負越多) -> 火焰越往上移
               right: 數字越大 -> 火焰越往左移
            */
            top: -2%; 
            right: 17%; 
            
            /* 【粗細與高度參數】 */
            width: 28px;  /* 調整粗細：數值越大越粗 (原為 14px，目前為 28px) */
            height: 85px; /* 調整高度：數值越大噴得越長 */
            
            /* 【顏色參數】噴射火焰核心 (底層白藍色) */
            background: linear-gradient(to top, #ffffff 0%, #00ffff 20%, #ff5500 80%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            
            /* 【光暈參數】外焰光暈 (藍橘交織) 
               要調整發光範圍，請更改每個顏色的第三個數值(px)：
               例如把 15px 改成 30px，藍光範圍就會變大兩倍。
            */
            box-shadow: 
                0 0 15px #00bfff,      /* 底部藍光擴散範圍 */
                0 -10px 30px #ff4500,  /* 頂部橘紅光擴散範圍 */
                0 0 50px #ff8c00;      /* 整體外圍橘光擴散範圍 */
            
            transform-origin: bottom center;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* 點火時的火焰動畫狀態 */
        #flame.active {
            opacity: 1;
            animation: jet-vibrate 0.04s infinite alternate;
        }

        /* 噴射火焰特有的高頻震動關鍵影格 */
        @keyframes jet-vibrate {
            0% { transform: translateY(0) scaleX(1) scaleY(1); }
            100% { transform: translateY(-3px) scaleX(1.05) scaleY(1.02); }
        }

    </style>
</head>
<body>

    <div id="glow-background"></div>

    <div id="lighter-container">
        <img id="lighter-img" src="lighter off.png" alt="Lighter" draggable="false">
        <div id="flame"></div>
    </div>

    <audio id="lighter-audio" src="lighter-sound-effect-feuerzeug-sound_PWeyCCjp.mp3" preload="auto"></audio>

    <script>
        const container = document.getElementById('lighter-container');
        const img = document.getElementById('lighter-img');
        const flame = document.getElementById('flame');
        const audio = document.getElementById('lighter-audio');
        const body = document.body;

        let isLit = false;

        function toggleLighter(e) {
            e.preventDefault(); 
            
            isLit = !isLit;

            if (isLit) {
                img.src = 'lighter on.png';
                flame.classList.add('active');
                body.classList.add('lit');
                
                audio.currentTime = 0; 
                audio.play().catch(error => {
                    console.log("瀏覽器自動播放限制，請確保由使用者手動點擊觸發", error);
                });
            } else {
                img.src = 'lighter off.png';
                flame.classList.remove('active');
                body.classList.remove('lit');
                
                audio.pause();
            }
        }

        container.addEventListener('pointerdown', toggleLighter);
    </script>

</body>
</html>
