<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>噴射防風打火機 - 最終修正</title>
    <style>
        :root {
            --bg-color: #050505;
            --bg-active: #1a1510; /* 點火後的環境色 */
            --lighter-width: 170px;
            --lighter-height: 420px;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease;
        }

        .lighters-container {
            position: relative;
            cursor: pointer;
            width: var(--lighter-width);
            height: var(--lighter-height);
        }

        .lighter-image {
            width: 100%;
            height: 100%;
            background-image: url('lighter.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            position: relative;
            z-index: 5; /* 機身在後 */
            transition: filter 0.3s ease;
        }

        /* 火燄容器 - 修正位置 */
        .flame-container {
            position: absolute;
            /* 針對黑機身噴嘴位置精確上移 */
            top: -140px; 
            left: 71.5%;
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999; /* 強制置頂，絕對不會被擋住 */
            pointer-events: none;
        }

        /* 真實噴射火焰：下藍核心 */
        .flame-inner-core {
            width: 8px;
            height: 140px;
            background: linear-gradient(to top, #fff 0%, #00d4ff 30%, rgba(0, 80, 255, 0) 100%);
            border-radius: 50% 50% 10% 10%;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 20px #00d4ff;
        }

        /* 真實噴射火焰：上橘外焰 */
        .flame-outer-glow {
            width: 18px;
            height: 160px;
            background: linear-gradient(to top, rgba(255, 100, 0, 0.9) 0%, rgba(255, 50, 0, 0) 100%);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(2px);
            box-shadow: 0 0 40px #ff6a00, 0 0 80px rgba(255, 0, 0, 0.4);
        }

        @keyframes jet-shake {
            0% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(1.08) scaleX(1.02); }
            100% { transform: translateX(-50%) scaleY(1); }
        }

        /* 點火後的火光感 */
        .active .lighter-image {
            filter: drop-shadow(0 0 60px rgba(255, 100, 0, 0.7)) brightness(1.2);
        }

        .active .flame-container {
            transform: translateX(-50%) scale(1);
            animation: jet-shake 0.05s infinite;
        }

        .hint {
            position: absolute;
            bottom: -40px;
            width: 100%;
            color: #333;
            text-align: center;
            font-size: 14px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="lighters-container" id="lighter">
        <div class="flame-container">
            <div class="flame-outer-glow"></div>
            <div class="flame-inner-core"></div>
        </div>
        <div class="lighter-image"></div>
        <p class="hint">CLICK TO IGNITE</p>
    </div>

    <script>
        const lighter = document.getElementById('lighter');
        let isOn = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPhysicalClick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            // 咖聲
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(1200, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
            g.gain.setValueAtTime(0.2, now);
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.05);

            // 噴氣聲
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const ng = audioCtx.createGain();
            ng.gain.setValueAtTime(0.08, now);
            ng.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            noise.connect(ng); ng.connect(audioCtx.destination);
            noise.start();
        }

        lighter.addEventListener('click', () => {
            isOn = !isOn;
            if (isOn) {
                lighter.classList.add('active');
                document.body.style.backgroundColor = "var(--bg-active)";
                playPhysicalClick();
            } else {
                lighter.classList.remove('active');
                document.body.style.backgroundColor = "var(--bg-color)";
            }
        });
    </script>
</body>
</html>
